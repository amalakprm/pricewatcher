{{define "products.html"}}
{{template "header" .}}
<div class="space-y-6" x-data="{ 
    searchVal: '',
    storeFilter: '',
    statusFilter: '',
    matches(product) {
        const sMatch = !this.searchVal || product.Title.toLowerCase().includes(this.searchVal.toLowerCase()) || product.URL.toLowerCase().includes(this.searchVal.toLowerCase());
        const storeMatch = !this.storeFilter || product.Site === this.storeFilter;
        let statusMatch = true;
        if (this.statusFilter === 'active') statusMatch = product.Active;
        else if (this.statusFilter === 'paused') statusMatch = !product.Active;
        else if (this.statusFilter === 'on_target') statusMatch = product.IsOnTarget;
        else if (this.statusFilter === 'above_target') statusMatch = !product.IsOnTarget && product.CurrentPrice > 0;
        
        return sMatch && storeMatch && statusMatch;
    }
}">
    <!-- Header -->
    <div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Products List</h1>
        <p class="text-xs text-slate-500 font-mono mt-1">Manage and filter watchlist items</p>
    </div>

    <!-- Filter Bar -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-wrap gap-4 items-center justify-between shadow">
        <div class="flex flex-wrap gap-3 items-center flex-grow">
            <!-- Search field -->
            <input type="search" 
                   x-model="searchVal"
                   placeholder="Search title or url..." 
                   class="bg-slate-950 border border-slate-800 rounded-lg px-3.5 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-indigo-500 hover:border-slate-700 transition w-full sm:w-64" />
            
            <!-- Store Selector -->
            <select x-model="storeFilter" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-300 focus:outline-none cursor-pointer">
                <option value="">All Stores</option>
                <option value="amazon">Amazon</option>
                <option value="flipkart">Flipkart</option>
            </select>

            <!-- Status Selector -->
            <select x-model="statusFilter" class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-300 focus:outline-none cursor-pointer">
                <option value="">All Statuses</option>
                <option value="active">Active</option>
                <option value="paused">Paused</option>
                <option value="on_target">On Target</option>
                <option value="above_target">Above Target</option>
            </select>
        </div>
    </div>

    <!-- Inject data into JS array for Alpine filtering -->
    <script>
        window.productsData = [
            {{range .Products}}
            {
                ID: {{.ID}},
                URL: "{{.URL}}",
                Base64URL: "{{.Base64URL}}",
                ShortURL: "{{.ShortURL}}",
                Site: "{{.Site}}",
                Title: "{{if .Title}}{{.Title}}{{else}}{{.ShortURL}}{{end}}",
                CurrentPrice: {{.CurrentPrice}},
                TargetPrice: {{.TargetPrice}},
                IsOnTarget: {{.IsOnTarget}},
                Active: {{.Active}},
                TimeSinceLastScrape: "{{.TimeSinceLastScrape}}"
            },
            {{end}}
        ];
    </script>

    <!-- Grid View Pane -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="p in window.productsData" :key="p.ID">
            <div x-show="matches(p)" 
                 class="bg-slate-900 border border-slate-805 hover:border-slate-700 rounded-xl p-5 shadow flex flex-col justify-between transition group relative cursor-pointer"
                 @click="window.location.href='/product/' + p.Base64URL">
                
                <div>
                    <!-- Badge Row -->
                    <div class="flex justify-between items-center mb-3">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase font-mono bg-slate-950 border border-slate-850 text-slate-400" x-text="p.Site === 'amazon' ? '📦 Amazon' : p.Site === 'flipkart' ? '⚡ Flipkart' : '🌐 ' + p.Site"></span>
                        <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold uppercase font-mono" 
                              :class="p.Active ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-slate-500'" 
                              x-text="p.Active ? 'Active' : 'Paused'"></span>
                    </div>

                    <!-- Title -->
                    <h3 class="text-sm font-bold text-white line-clamp-2 leading-snug group-hover:text-indigo-400 transition" x-text="p.Title"></h3>
                </div>

                <!-- Pricing Section -->
                <div class="mt-4 pt-3 border-t border-slate-850 space-y-3.5">
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-[9px] text-slate-500 uppercase block font-mono">Current Price</span>
                            <span class="text-base font-bold font-mono" :class="p.IsOnTarget ? 'text-emerald-400' : 'text-slate-200'" x-text="p.CurrentPrice > 0 ? '₹' + p.CurrentPrice : 'N/A'"></span>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-slate-500 uppercase block font-mono">Target Price</span>
                            <span class="text-sm font-bold font-mono text-indigo-400" x-text="'₹' + p.TargetPrice"></span>
                        </div>
                    </div>

                    <!-- Difference -->
                    <div class="flex justify-between items-center text-[10px] font-mono">
                        <span class="text-slate-500">Difference:</span>
                        <span class="font-bold" 
                              :class="p.CurrentPrice <= p.TargetPrice ? 'text-emerald-400' : 'text-rose-400'"
                              x-text="p.CurrentPrice > 0 ? (p.CurrentPrice <= p.TargetPrice ? '₹' + Math.abs(p.CurrentPrice - p.TargetPrice) + ' below' : '₹' + (p.CurrentPrice - p.TargetPrice) + ' above') : 'N/A'">
                        </span>
                    </div>

                    <!-- Footer detail -->
                    <div class="text-[9px] text-slate-500 font-mono flex justify-between items-center">
                        <span x-text="'Checked ' + p.TimeSinceLastScrape"></span>
                    </div>

                    <!-- Quick buttons -->
                    <div class="flex gap-1.5 justify-end pt-1" @click.stop="">
                        <a :href="'/product/' + p.Base64URL" 
                           class="px-2.5 py-1.5 bg-slate-950 hover:bg-slate-800 border border-slate-850 rounded text-[10px] font-semibold text-slate-300 hover:text-white transition">
                            View
                        </a>
                        <button hx-post="/api/run?url=" :hx-post="'/api/run?url=' + p.Base64URL"
                                hx-swap="none"
                                class="px-2.5 py-1.5 bg-slate-950 hover:bg-slate-800 border border-slate-850 rounded text-[10px] font-semibold text-slate-300 hover:text-white transition">
                            Refresh
                        </button>
                        <a :href="p.URL" target="_blank" 
                           class="px-2.5 py-1.5 bg-slate-950 hover:bg-slate-800 border border-slate-850 rounded text-[10px] font-semibold text-indigo-400 hover:text-indigo-300 transition">
                            Store
                        </a>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
{{template "footer" .}}
{{end}}
