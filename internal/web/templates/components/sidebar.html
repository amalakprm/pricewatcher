{{define "components/sidebar"}}
<aside id="sidebar-desktop" class="hidden md:flex w-64 bg-slate-900 border-r border-slate-800 text-slate-300 flex-col fixed top-0 left-0 h-screen z-40 shadow-md">
    <!-- Header/Brand -->
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
        <span class="text-xl mr-2">💰</span>
        <span class="text-base font-bold text-white tracking-tight">PriceWatcher</span>
    </div>

    <!-- Navigation List -->
    <nav class="flex-grow py-6 px-4 space-y-1">
        {{ $activePage := .ActivePage }}
        <a href="/" class="flex items-center px-3 py-2.5 rounded-lg text-xs font-semibold uppercase tracking-wider transition {{if eq $activePage "dashboard"}}bg-indigo-600 text-white{{else}}hover:bg-slate-800 hover:text-white{{end}}">
            <span class="mr-3">📊</span> Dashboard
        </a>
        <a href="/products" class="flex items-center px-3 py-2.5 rounded-lg text-xs font-semibold uppercase tracking-wider transition {{if eq $activePage "products"}}bg-indigo-600 text-white{{else}}hover:bg-slate-800 hover:text-white{{end}}">
            <span class="mr-3">🔍</span> Products
        </a>
        <a href="/logs" class="flex items-center px-3 py-2.5 rounded-lg text-xs font-semibold uppercase tracking-wider transition {{if eq $activePage "logs"}}bg-indigo-600 text-white{{else}}hover:bg-slate-800 hover:text-white{{end}}">
            <span class="mr-3">💻</span> Logs
        </a>
        <a href="/settings" class="flex items-center px-3 py-2.5 rounded-lg text-xs font-semibold uppercase tracking-wider transition {{if eq $activePage "settings"}}bg-indigo-600 text-white{{else}}hover:bg-slate-800 hover:text-white{{end}}">
            <span class="mr-3">⚙️</span> Settings
        </a>
    </nav>

    <!-- Version Info Footer -->
    <div class="p-4 border-t border-slate-800 text-[10px] font-mono text-slate-500">
        <p>v1.2.0-simple</p>
    </div>
</aside>
{{end}}
