{{define "components/topbar"}}
<header class="bg-slate-900 border-b border-slate-800 h-16 flex items-center justify-between px-4 md:px-6 sticky top-0 z-30 shadow">
    <!-- Left: Hamburger (mobile) + Brand -->
    <div class="flex items-center space-x-3">
        <!-- Hamburger button — only visible on mobile -->
        <button @click="mobileSidebarOpen = true"
                class="md:hidden p-2 -ml-1 rounded text-slate-400 hover:text-white hover:bg-slate-800 transition min-h-[44px] min-w-[44px] flex items-center justify-center"
                aria-label="Open menu">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <span class="text-sm font-bold text-white uppercase tracking-wider font-mono hidden sm:block">PriceWatcher Console</span>
    </div>

    <!-- Right Controls -->
    <div class="flex items-center space-x-3 md:space-x-6 text-xs">
        
        <!-- Last Run Stat — hidden on small screens -->
        <div class="hidden md:flex flex-col text-right font-mono text-[10px] text-slate-500">
            <span>Last Run:</span>
            <span class="text-slate-300 font-semibold mt-0.5">
                {{if .LastRun}}
                    #{{.LastRun.ID}} ({{.LastRun.Status}}) &bull; {{.LastRun.FinishedAt.Format "15:04:05"}}
                {{else}}
                    Never
                {{end}}
            </span>
        </div>

        <!-- Scraper Status -->
        <div id="status-badge" hx-get="/api/status" hx-trigger="load, every 5s" hx-swap="outerHTML">
            {{template "components/status-badge" .}}
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center space-x-2">
            <!-- Refresh Page -->
            <button onclick="location.reload()" 
                    class="px-3 py-2.5 bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white rounded font-semibold transition min-h-[44px]">
                <span class="hidden sm:inline">Refresh</span>
                <svg class="sm:hidden h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
            </button>
            
            <!-- Run Now -->
            <button hx-post="/api/run"
                    hx-swap="none"
                    hx-indicator="#run-spinner"
                    class="px-3 py-2.5 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded font-semibold transition flex items-center gap-1.5 min-h-[44px]">
                <svg id="run-spinner" class="htmx-indicator animate-spin h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Run Now</span>
            </button>
        </div>
    </div>
</header>
{{end}}
