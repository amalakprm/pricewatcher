{{define "components/topbar"}}
<header class="bg-slate-900 border-b border-slate-800 h-16 flex items-center justify-between px-6 sticky top-0 z-30 shadow">
    <!-- Brand Title -->
    <div class="flex items-center space-x-3">
        <span class="text-sm font-bold text-white uppercase tracking-wider font-mono">PriceWatcher Console</span>
    </div>

    <!-- Right Controls -->
    <div class="flex items-center space-x-6 text-xs">
        
        <!-- Last Run Stat -->
        <div class="hidden md:flex flex-col text-right font-mono text-[10px] text-slate-500">
            <span>Last Run:</span>
            <span class="text-slate-300 font-semibold mt-0.5">
                {{if .LastRun}}
                    #{{.LastRun.ID}} ({{.LastRun.Status}}) &bull; {{.LastRun.FinishedAt.Format "15:04:05"}}
                {{else}}
                    Never
                {{end}}
            </span>
        </div>

        <!-- Scraper Status -->
        <div id="status-badge" hx-get="/api/status" hx-trigger="load, every 5s" hx-swap="outerHTML">
            {{template "components/status-badge" .}}
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center space-x-2">
            <!-- Refresh Page -->
            <button onclick="location.reload()" 
                    class="px-3 py-1.5 bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-300 hover:text-white rounded font-semibold transition">
                Refresh
            </button>
            
            <!-- Run Now -->
            <button hx-post="/api/run"
                    hx-swap="none"
                    hx-indicator="#run-spinner"
                    class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded font-semibold transition flex items-center gap-1.5">
                <svg id="run-spinner" class="htmx-indicator animate-spin h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Run Now</span>
            </button>
        </div>
    </div>
</header>
{{end}}
